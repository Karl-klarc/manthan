<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Manthan</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
  :root {
    --bg: #0E0E11; --card: #16161B; --card2: #1E1E24;
    --border: #26262D; --border-gold: #3A3324;
    --gold: #C9A44C; --gold-ink: #241C08;
    --text: #C9A44C; --text2: #B5B2A8; --muted: #8B8B94; --dim: #6E6E77;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding-bottom: 76px;
  }
  .hdr { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; border-bottom: 1px solid var(--card2); }
  .hdr b { font-size: 16px; font-weight: 600; }
  .wallet { font-size: 12px; color: var(--gold); border: 1px solid var(--border-gold);
    border-radius: 999px; padding: 4px 12px; background: none; cursor: pointer; }
  .page { padding: 18px; display: none; }
  .page.on { display: block; }
  .card { background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 14px; }
  .card.gold { border-color: var(--border-gold); }
  .center { text-align: center; }
  .label { font-size: 12px; color: var(--muted); }
  .big { font-size: 36px; font-weight: 600; color: var(--gold); margin: 6px 0 2px; }
  .bar { background: var(--card2); border-radius: 999px; height: 6px; overflow: hidden; margin-top: 12px; }
  .bar > div { height: 100%; background: var(--gold); transition: width .4s; }
  .row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; margin-top: 10px; }
  .row .k { color: var(--text2); } .row .v { font-weight: 600; }
  .cta { display: block; width: 100%; background: var(--gold); color: var(--gold-ink);
    border: none; border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 4px; }
  .cta:disabled { opacity: .45; }
  .hint { text-align: center; font-size: 11.5px; color: var(--dim); margin-top: 10px; }
  .nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--bg); border-top: 1px solid var(--card2); padding: 8px 4px 14px; }
  .nav button { flex: 1; background: none; border: none; color: var(--dim);
    font-size: 10.5px; cursor: pointer; }
  .nav button.on { color: var(--gold); }
  .nav svg { display: block; margin: 0 auto 3px; width: 20px; height: 20px; }
  .item { display: flex; justify-content: space-between; padding: 12px 2px;
    border-bottom: 1px solid var(--card2); font-size: 13.5px; }
  .win { color: var(--gold); }
  .mono { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); word-break: break-all; }
  .badge { display: inline-block; font-size: 11px; color: var(--gold);
    border: 1px solid var(--border-gold); border-radius: 999px; padding: 2px 10px; margin-bottom: 10px; }
  p.txt { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
  .demo { position: fixed; top: 64px; right: 12px; font-size: 10px; color: var(--gold-ink);
    background: var(--gold); border-radius: 6px; padding: 2px 8px; opacity: .9; }
  .rules h3 { font-size: 14px; font-weight: 600; color: var(--gold); margin: 16px 0 6px; }
  .rules h3:first-child { margin-top: 0; }
  .rules p { font-size: 13.5px; color: var(--text2); line-height: 1.6; margin: 6px 0; }
  .rules ul { padding-left: 18px; margin: 6px 0; }
  .rules li { font-size: 13.5px; color: var(--text2); line-height: 1.6; margin: 4px 0; }
  .overlay { position: fixed; inset: 0; background: rgba(10,10,13,.82); display: none;
    align-items: flex-end; z-index: 50; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .overlay.on { display: flex; }
  .sheet { background: var(--card); border: 1px solid var(--border-gold); border-bottom: none;
    border-radius: 20px 20px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    width: 100%; max-height: 85vh; overflow-y: auto; }
  .sheet-title { font-size: 17px; font-weight: 600; color: var(--gold); margin-bottom: 12px; }
  .chkrow { display: flex; align-items: flex-start; gap: 10px; margin: 16px 0 14px;
    font-size: 14px; color: var(--text2); cursor: pointer; line-height: 1.4; }
  .chkrow input { width: 18px; height: 18px; accent-color: var(--gold); flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>

<div class="hdr">
  <b id="appName"></b> <!-- название появится здесь: CONFIG.appName -->
  <div style="display:flex;gap:8px;align-items:center">
    <button class="wallet" id="langBtn" onclick="App.toggleLang()" style="color:var(--muted);border-color:var(--border)">EN</button>
    <button class="wallet" id="demoBal" style="display:none">🎮</button>
    <button class="wallet" id="walletBtn" onclick="App.connect()">…</button>
  </div>
</div>
<div class="demo" id="demoBadge" style="display:none">DEMO</div>

<div class="page on" id="pg-home">
  <div class="card center">
    <div class="label" id="roundLabel"></div>
    <div class="big" id="prize"></div>
    <div class="label">GRAM</div>
    <div class="bar"><div id="fillBar" style="width:0%"></div></div>
    <div class="label" style="margin-top:8px" id="partLabel"></div>
  </div>
  <div class="row" style="margin:0 4px 12px">
    <span class="k" id="t_untilDraw"></span>
    <span class="v" id="countdown">—</span>
  </div>
  <button class="cta" id="betBtn" onclick="App.placeBet()"></button>
  <div class="hint" id="betHint"></div>
  <div class="card gold" style="margin-top:16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer" onclick="App.go('jackpot')">
    <div>
      <div class="label" id="t_weeklyJp"></div>
      <div style="font-size:19px;font-weight:600;margin-top:2px" id="jpFundMini"></div>
    </div>
    <span style="color:var(--gold);font-size:13px" id="jpDays"></span>
  </div>
</div>

<div class="page" id="pg-jackpot">
  <div class="card gold center">
    <div class="label" id="jpWhen"></div>
    <div class="big" id="jpFund"></div>
    <div class="label" id="t_jpAmong"></div>
  </div>
  <div class="card">
    <div class="row" style="margin:0"><span class="k" id="t_yourPlays"></span><span class="v" id="jpPlays"></span></div>
    <div class="bar"><div id="jpBar" style="width:0%"></div></div>
    <div class="hint" style="text-align:left" id="jpHint"></div>
  </div>
  <div class="card">
    <div class="row" style="margin:0"><span class="k" id="t_yourTickets"></span><span class="v" id="jpTickets"></span></div>
    <div class="row"><span class="k" id="t_allTickets"></span><span class="v" id="jpTotal"></span></div>
    <div class="row"><span class="k" id="t_yourChance"></span><span class="v" id="jpChance"></span></div>
  </div>
  <button class="cta" id="jpDrawBtn" style="display:none" onclick="App.jpDemoDraw()"></button>
  <p class="txt" id="t_jpRules"></p>
</div>

<div class="page" id="pg-history">
  <div class="card"><div id="histList"></div></div>
</div>

<div class="page" id="pg-fair">
  <div class="card">
    <span class="badge" id="t_howItWorks"></span>
    <p class="txt" id="t_fairText"></p>
  </div>
  <div class="card">
    <div class="label" style="margin-bottom:8px" id="t_lastDraw"></div>
    <div class="row" style="margin:0"><span class="k">Commit</span></div>
    <div class="mono" id="fairCommit"></div>
    <div class="row"><span class="k">Reveal (secret)</span></div>
    <div class="mono" id="fairSecret"></div>
    <div class="row"><span class="k" id="t_winnerIdx"></span><span class="v" id="fairWinner"></span></div>
    <button class="cta" style="margin-top:14px" onclick="App.verify()" id="t_verifyBtn"></button>
    <div class="hint" id="verifyResult"></div>
  </div>
</div>

<div class="page rules" id="pg-rules">
  <div id="rulesBody"></div>
</div>

<div class="overlay" id="consentOv">
  <div class="sheet">
    <div class="sheet-title" id="t_consentTitle"></div>
    <div class="rules" id="consentBody"></div>
    <label class="chkrow"><input type="checkbox" id="consentChk" onchange="App.consentToggle()">
      <span id="t_consentChk"></span></label>
    <button class="cta" id="consentBtn" disabled onclick="App.acceptConsent()"></button>
  </div>
</div>

<div class="overlay" id="resultOv">
  <div class="sheet center">
    <div style="font-size:34px;margin-bottom:8px" id="resEmoji"></div>
    <p class="txt" id="resText"></p>
    <button class="cta" style="margin-top:16px" id="resAgain" onclick="App.simAgain()"></button>
    <button class="wallet" style="margin-top:12px" id="resClose" onclick="App.closeResult()"></button>
  </div>
</div>

<div class="overlay" id="testnetOv">
  <div class="sheet center">
    <div style="font-size:30px;margin-bottom:10px">🧪</div>
    <p class="txt" id="t_testnetText" style="text-align:left"></p>
    <button class="cta" style="margin-top:16px" id="t_testnetOk" onclick="App.closeTestnet()"></button>
  </div>
</div>

<div class="nav">
  <button class="on" data-pg="home" onclick="App.go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 12 12 4l7 8M6 10v9h12v-9"/></svg><span id="n_home"></span></button>
  <button data-pg="jackpot" onclick="App.go('jackpot')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 5h12l3 5-9 10L3 10z M3 10h18 M12 20 8 10l2-5 M12 20l4-10-2-5"/></svg><span id="n_jackpot"></span></button>
  <button data-pg="history" onclick="App.go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span id="n_history"></span></button>
  <button data-pg="fair" onclick="App.go('fair')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3 4 6v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V6z M9 12l2 2 4-4"/></svg><span id="n_fair"></span></button>
  <button data-pg="rules" onclick="App.go('rules')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 4h9a3 3 0 0 1 3 3v13H8a2 2 0 0 1-2-2z M6 4v14 M10 9h5 M10 13h5"/></svg><span id="n_rules"></span></button>
</div>

<script>
// ============================================================
// КОНФИГ И ФИЧЕ-ФЛАГИ (фаза 2 включается здесь, без пересборки)
// ============================================================
const CONFIG = {
  appName: "Manthan",              // मन्थन — «пахтанье океана»: общий труд ради общего сокровища
  demoMode: false,                 // боевой режим: живые данные из testnet (16.07.2026)
  contractLottery: "kQAawWmpsSecDPcBUbLiTw_YU93WOTYfgyOFb1uCct0TJWjw",  // LotteryRound, testnet, 18.07.2026
  contractJackpot: "kQCYO979ZE7j-LQpeWe2T2OOfgMT4YOSsok9nXy_OHxCvb0G",  // JackpotPool, testnet (v2, после фикса J-1)
  manifestUrl: "https://karl-klarc.github.io/manthan/tonconnect-manifest.json",
  features: { voice: false, spend: false, feed: false },
  betAmount: 1, maxPlayers: 1000, minPlays: 7,
  testnet: true,   // testnet: плашка при открытии вместо экрана согласия (rules-draft.md §2)
  demoPlay: true, demoStart: 10,  // демо-счёт: игра без кошелька на виртуальные монеты
};

// ============================================================
// I18N — авто по языку Telegram, fallback ru
// ============================================================
const STR = {
  ru: {
    untilDraw: "до розыгрыша", weeklyJp: "Джекпот недели", connect: "Подключить",
    bet: (a) => `Участвовать · ${a} GRAM`, inRound: "Вы в раунде ✓",
    betHint: (n) => `Один кошелёк — один билет · шанс 1/${n}`,
    round: (id) => `призовой фонд`, part: (a,b) => `${a} / ${b} участников`,
    jpWhen: (d,h) => `разыграется через ${d} д ${h} ч`, jpAmong: "GRAM · среди игроков без побед",
    yourPlays: "Ваши участия за неделю", yourTickets: "Ваши билеты",
    allTickets: "Всего билетов в барабане", yourChance: "Ваш шанс",
    jpHint: (n) => n > 0 ? `Ещё ${n} участия без победы — и вы в розыгрыше` : "Вы допущены к розыгрышу",
    jpRules: "Шансы пропорциональны вашим проигрышам. Победа в раунде исключает из джекпота до следующей недели.",
    days: (d) => `${d} дн.`, home: "Главная", jackpot: "Джекпот", history: "История", fair: "Прозрачность",
    howItWorks: "Как проверить розыгрыш", winnerIdx: "Индекс победителя",
    fairText: "Оператор публикует хеш секрета ДО начала раунда (commit) и раскрывает секрет после закрытия (reveal). Победитель = hash(secret + block seed) mod N. Подменить результат нельзя: при коммите оператор не знал ни участников, ни seed. Нажмите «Проверить» — пересчёт произойдёт прямо на вашем устройстве.",
    lastDraw: "Последний розыгрыш", verify: "Проверить пересчётом",
    verifyOk: "✓ Хеш совпадает — розыгрыш честный", win: "выигрыш", lost: "без выигрыша",
    connected: "Кошелёк подключён (демо)",
    rules: "Правила",
    consentTitle: "Прежде чем играть",
    consentChk: "Понимаю и принимаю",
    consentPlay: "Играть",
    testnetText: "Это тестовая версия. Все монеты здесь — тестовые и не имеют никакой ценности. Играйте, ломайте, пишите нам о найденных ошибках.",
    testnetOk: "Понятно",
    demoBal: (b) => `🎮 ${b} GRAM`,
    demoHint: "Демо-счёт: играете на виртуальные монеты, без кошелька. Шансы честные — как в настоящем раунде.",
    demoRoundLabel: "демо-раунд · призовой фонд",
    demoBet: (a) => `Попробовать · ${a} GRAM (демо)`,
    demoWin: (p) => `Вы выиграли ${p} GRAM! Монеты зачислены на демо-счёт. Победа выводит из недельного джекпота — счётчики недели начаты заново.`,
    demoLose: "В этот раз не повезло — так выглядит обычный исход. Шанс был честный: один из числа участников. Зато проигрыш добавил вам билет недельного джекпота.",
    demoRefilled: "Демо-счёт пополнен. Играйте дальше!",
    demoAgain: "Сыграть ещё", demoClose: "Закрыть", demoTag: "демо",
    jpDemoWhen: "демо-джекпот · разыграется после 7-й игры без побед",
    jpDemoDraw: "Разыграть демо-джекпот",
    jpDemoWin: (p) => `🏆 Джекпот ваш! +${p} GRAM на демо-счёт. Счётчики новой недели — с нуля.`,
    jpDemoLose: "Джекпот забрал другой игрок — билетов у него было больше. Новая неделя, счётчики обнулены.",
    histEmpty: "Настоящих розыгрышей ещё не было — всё впереди",
    winnerShort: (a) => `выиграл ${a.slice(0, 6)}…${a.slice(-4)}`,
    verifyNone: "Розыгрышей ещё не было — проверять пока нечего",
    consentHtml: `<p>Подтвердите, что вы понимаете правила игры:</p><ul>
      <li>Это игра на реальные средства. Выигрыш не гарантирован, потеря ставки — обычный исход.</li>
      <li>Транзакции в блокчейне необратимы: отправленную ставку нельзя отменить.</li>
      <li>Розыгрыш определяется алгоритмом, описанным в правилах; его честность можно проверить, но на его исход нельзя повлиять.</li>
      <li>Я прочитал(а) правила и принимаю их.</li></ul>`,
    rulesHtml: `<div class="card rules">
      <h3>Как это работает</h3>
      <p>Вы отправляете 1 GRAM — и получаете билет текущего раунда. Один кошелёк — один билет: у всех участников равные шансы. Раунд завершается, когда наберётся 1000 участников или наступит время розыгрыша (каждые ~3,5 часа) — что случится раньше. Если к моменту розыгрыша участников меньше двух, ставки просто переходят в следующий раунд — ничего не сгорает.</p>
      <h3>Куда идут деньги раунда</h3>
      <ul><li>88% — победителю раунда</li><li>7% — в недельный джекпот</li><li>5% — площадке за работу сервиса</li></ul>
      <p>Эти проценты зашиты в смарт-контракт. Мы физически не можем изменить их задним числом или забрать призовой фонд — код открыт, проверьте сами.</p>
      <h3>Недельный джекпот</h3>
      <p>Каждую неделю разыгрывается джекпот среди тех, кому не везло: если за неделю вы сыграли 7 и более раз и ни разу не выиграли — вы в розыгрыше. Чем больше проигрышей за неделю, тем выше шанс: каждый проигрыш — дополнительный билет в барабане. Победа в любом раунде недели выводит из джекпота до следующей недели — утешительный приз только для тех, кто без выигрышей.</p>
      <h3>Автоучастие</h3>
      <p>Можно внести депозит (до 50 GRAM) — и участвовать в каждом раунде автоматически. Остановить можно в любой момент одной кнопкой: остаток вернётся мгновенно, ничьего разрешения для этого не нужно.</p>
      <h3>Как проверить, что розыгрыш честный</h3>
      <p>До начала раунда оператор публикует «отпечаток» секретного числа (хеш). После завершения раунда секрет раскрывается, и победитель определяется из секрета и данных блокчейна, которые оператор не контролирует. Подменить результат нельзя: на момент публикации отпечатка оператор не знал ни состава участников, ни данных будущего блока. На вкладке «Прозрачность» можно пересчитать результат любого розыгрыша прямо на своём устройстве.</p>
      </div>
      <div class="card rules gold">
      <h3>Скажем прямо</h3>
      <ul>
      <li>Это азартная игра. В среднем игроки получают назад 88% поставленного (плюс часть возвращается через джекпот). Это значит: при долгой игре проигрыш — математическое ожидание, а не невезение. Играйте ради удовольствия, а не ради заработка.</li>
      <li>Блокчейн не прощает ошибок: перевод на неправильный адрес или не той суммы невозможно отменить. Проверяйте адрес контракта на этой странице — и нигде больше.</li>
      <li>Победы видны в блокчейне: адрес победителя и сумма публичны (это часть честности системы). Ваше имя при этом нигде не публикуется.</li>
      </ul>
      <h3>Адрес контракта — единственный настоящий</h3>
      <div class="mono">${CONFIG.contractLottery}</div>
      <p>Любой другой адрес, где бы вы его ни увидели, — мошенничество.</p>
      </div>
      <div class="card rules">
      <h3>Рекомендации</h3>
      <ul>
      <li>Заведите отдельный кошелёк для игры и держите на нём только ту сумму, которую готовы потратить на развлечение.</li>
      <li>Не играйте на деньги, которые нужны для жизни. Никогда.</li>
      <li>Лимит автоучастия — ваш инструмент: внесите столько, сколько считаете разумным на неделю, и не пополняйте раньше срока.</li>
      <li>Если замечаете, что игра перестала быть развлечением — тянет отыграться, скрываете траты, играете на заёмные — остановитесь и поговорите с кем-то, кому доверяете. Это важнее любого джекпота.</li>
      </ul></div>`,
  },
  en: {
    untilDraw: "until draw", weeklyJp: "Weekly jackpot", connect: "Connect",

// ============================================================
// ЖИВЫЕ ДАННЫЕ ИЗ TESTNET (при demoMode=false)
// Чтение get-методов контрактов через публичный API toncenter
// ============================================================
// --- Минимальные BOC-утилиты (аргументы get-методов и разбор тел сообщений) ---
const Boc = {
  // адрес ("0:hex" или friendly base64url) → BOC-слайс для стека get-метода
  addressSlice(addr) {
    let wc, hash;
    if (addr.includes(":")) {
      wc = parseInt(addr.split(":")[0], 10);
      hash = addr.split(":")[1].match(/../g).map(h => parseInt(h, 16));
    } else {
      const raw = Uint8Array.from(atob(addr.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0));
      wc = raw[1] << 24 >> 24; hash = [...raw.slice(2, 34)];
    }
    const bits = [1, 0, 0];                       // addr_std$10 + без anycast
    for (let i = 7; i >= 0; i--) bits.push((wc >> i) & 1);
    for (const b of hash) for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
    bits.push(1); while (bits.length % 8) bits.push(0);   // completion tag
    const data = new Uint8Array(bits.length / 8);
    bits.forEach((b, i) => { if (b) data[i >> 3] |= 1 << (7 - (i & 7)); });
    const boc = new Uint8Array(13 + data.length);
    boc.set([0xB5, 0xEE, 0x9C, 0x72, 1, 1, 1, 1, 0, 2 + data.length, 0, 0, 67]);
    boc.set(data, 13);
    return btoa(String.fromCharCode(...boc));
  },
  // побитовый читатель первой ячейки BOC (тела сообщений контракта)
  reader(b64) {
    try {
      const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      let p = 4;
      const flags = raw[p++], sz = flags & 7, off = raw[p++];
      const rd = n => { let v = 0; while (n--) v = v * 256 + raw[p++]; return v; };
      const cells = rd(sz), roots = rd(sz); rd(sz); rd(off);
      p += roots * sz;
      if (flags & 0x80) p += cells * off;         // пропустить индекс, если есть
      p++;                                        // d1 корневой ячейки
      const d2 = raw[p++];
      const data = raw.slice(p, p + Math.ceil(d2 / 2));
      let bit = 0;
      return { bits(n) { let v = 0; while (n--) { v = v * 2 + ((data[bit >> 3] >> (7 - (bit & 7))) & 1); bit++; } return v; } };
    } catch { return null; }
  },
};

const sameAddr = (a, b) => a && b && a.toLowerCase() === b.toLowerCase();

const Chain = {
  api: "https://testnet.toncenter.com/api/v2/runGetMethod",
  msgApi: "https://testnet.toncenter.com/api/v3/messages",
  async get(address, method, stack = []) {
    const r = await fetch(Chain.api, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ address, method, stack }),
    });
    const j = await r.json();
    if (!j.ok || j.result.exit_code !== 0) throw new Error("get failed");
    return j.result.stack.map(x => parseInt(x[1], 16));
  },
  async refresh() {
    try {
      const [roundId, phase, deadline, count, pool, prize] =
        await Chain.get(CONFIG.contractLottery, "get_round_info");
      D.round.id = roundId;
      D.round.players = count;
      D.round.deadline = deadline * 1000;
      const [periodId, jpPhase, jpDeadline, fund, tickets, pending] =
        await Chain.get(CONFIG.contractJackpot, "get_jackpot_info");
      D.jackpot.fund = fund / 1e9;
      D.jackpot.deadline = jpDeadline * 1000;
      D.jackpot.totalTickets = tickets;
      // персональные данные подключённого кошелька — из тех же контрактов
      if (D.connected && D.wallet) {
        const arg = [["tvm.Slice", Boc.addressSlice(D.wallet)]];
        const [ticket] = await Chain.get(CONFIG.contractLottery, "has_ticket", arg);
        D.myTicket = ticket !== 0;
        const [plays, wins, myTickets] = await Chain.get(CONFIG.contractJackpot, "get_player_stats", arg);
        D.jackpot.myPlays = plays;
        D.jackpot.myTickets = myTickets;
      }
      App.render();
    } catch (e) { console.warn("chain refresh failed", e); }
  },
  // История розыгрышей: исходящие PrizeNotification (0x50525A31) контракта лотереи.
  // Каждое такое сообщение = состоявшийся раунд: победитель, сумма, номер раунда.
  async loadHistory() {
    try {
      const r = await fetch(Chain.msgApi + "?source="
        + encodeURIComponent(CONFIG.contractLottery) + "&limit=64");
      const j = await r.json();
      const real = [];
      for (const m of (j.messages || [])) {
        const b = m.message_content && Boc.reader(m.message_content.body);
        if (!b || b.bits(32) !== 0x50525A31) continue;
        const roundId = b.bits(32);
        const prize = Math.round(+m.value / 1e9 * 100) / 100;
        real.push({
          id: roundId, prize, amount: prize, winner: m.destination,
          win: sameAddr(m.destination, D.wallet),
        });
      }
      real.sort((a, b2) => b2.id - a.id);
      D.history = [...D.history.filter(h => h.demo), ...real];
      App.render();
    } catch (e) { console.warn("history load failed", e); }
  },
};

const tg = window.Telegram && window.Telegram.WebApp;
let lang = localStorage.getItem("manthan_lang")

const $ = (id) => document.getElementById(id);

// ============================================================
// ДЕМО-СЧЁТ — игра на виртуальные монеты без кошелька.
// Быстрый локальный раунд (15 с), шанс честный: 1 из N участников.
// ============================================================
const Sim = {
  active: false, players: 0, deadline: 0,
  get balance() {
    const v = localStorage.getItem("manthan_demo_bal");
    return v === null ? CONFIG.demoStart : +v;
  },
  set balance(v) { localStorage.setItem("manthan_demo_bal", Math.round(v * 10) / 10); },
  loadHist() {
    try { return JSON.parse(localStorage.getItem("manthan_demo_hist")) || []; }
    catch { return []; }
  },
  saveHist(entry) {
    const h = Sim.loadHist();
    h.unshift(entry);
    localStorage.setItem("manthan_demo_hist", JSON.stringify(h.slice(0, 20)));
  },
  // Демо-джекпот — та же механика, что в контракте JackpotPool:
  // 7% каждого раунда в фонд, допуск = ≥7 участий без побед,
  // билеты = проигрыши, победа в раунде выводит до «следующей недели».
  jp: null,
  freshJp() { return { fund: 0, plays: 0, losses: 0, bots: 25 + Math.floor(Math.random() * 30) }; },
  loadJp() {
    try { const j = JSON.parse(localStorage.getItem("manthan_demo_jp")); if (j) return j; }
    catch {}
    return Sim.freshJp();
  },
  saveJp() { localStorage.setItem("manthan_demo_jp", JSON.stringify(Sim.jp)); },
};
Sim.jp = Sim.loadJp();

const App = {
  go(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("on"));
    $("pg-" + page).classList.add("on");
    document.querySelectorAll(".nav button").forEach(b => b.classList.toggle("on", b.dataset.pg === page));
  },
  toggleLang() {
    lang = lang === "ru" ? "en" : "ru";
    T = STR[lang];
    localStorage.setItem("manthan_lang", lang);
    App.initTexts(); App.render();
  },
  tc: null,   // экземпляр TON Connect UI (не-демо режим)
  connect() {
    if (CONFIG.demoMode) {
      D.connected = true;
      $("walletBtn").textContent = "UQAb…x7F";
      if (tg) tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("success");
      else alert(T.connected);
      return;
    }
    App.tc && App.tc.openModal();
  },
  // Согласие перед первой ставкой (rules-draft.md §2).
  // В testnet вместо согласия — плашка при открытии (см. init).
  consentToggle() { $("consentBtn").disabled = !$("consentChk").checked; },
  acceptConsent() {
    if (!$("consentChk").checked) return;
    localStorage.setItem("manthan_consent", "1");
    $("consentOv").classList.remove("on");
    App.placeBet();
  },
  closeTestnet() { $("testnetOv").classList.remove("on"); },
  // --- демо-игра ---
  simPlay() {
    if (Sim.active) return;
    if (Sim.balance < CONFIG.betAmount) {
      Sim.balance = CONFIG.demoStart;
      $("resEmoji").textContent = "🎮";
      $("resText").textContent = T.demoRefilled;
      $("resultOv").classList.add("on");
      App.render();
      return;
    }
    Sim.balance -= CONFIG.betAmount;
    Sim.active = true;
    Sim.players = 6 + Math.floor(Math.random() * 7);   // 6–12 участников
    Sim.deadline = Date.now() + 15000;
    App.render();
  },
  simFinish() {
    const win = Math.random() < 1 / Sim.players;       // честный шанс 1/N
    const prize = Math.round(Sim.players * CONFIG.betAmount * 0.88 * 10) / 10;
    Sim.active = false;
    if (win) Sim.balance += prize;
    const entry = { demo: true, prize, win, amount: prize };
    D.history.unshift(entry);
    Sim.saveHist(entry);
    Sim.jp.fund = Math.round((Sim.jp.fund + Sim.players * CONFIG.betAmount * 0.07) * 100) / 100;
    Sim.jp.plays += 1;
    if (win) { Sim.jp.plays = 0; Sim.jp.losses = 0; }  // победа выводит из джекпота до следующей недели
    else Sim.jp.losses += 1;
    Sim.saveJp();
    // в демо «неделя» сжата: допуск получен → джекпот разыгрывается сразу после этой игры
    Sim.jpAuto = Sim.jp.plays >= CONFIG.minPlays && Sim.jp.losses > 0;
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(win ? "success" : "warning");
    $("resEmoji").textContent = win ? "🎉" : "😕";
    $("resText").textContent = win ? T.demoWin(prize) : T.demoLose;
    $("resultOv").classList.add("on");
    App.render();
  },
  simAgain() {
    if (Sim.jpAuto) { App.closeResult(); return; }  // сначала — авторозыгрыш джекпота
    App.closeResult(); App.placeBet();
  },
  jpDemoDraw() {
    const jp = Sim.jp;
    const myT = jp.plays >= CONFIG.minPlays ? jp.losses : 0;
    if (myT <= 0 || Sim.active) return;
    const total = myT + jp.bots;
    const win = Math.random() < myT / total;   // шансы пропорциональны проигрышам
    const fund = jp.fund;
    if (win) Sim.balance += fund;
    Sim.jp = Sim.freshJp();                    // после розыгрыша счётчики недели обнуляются
    Sim.saveJp();
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(win ? "success" : "warning");
    $("resEmoji").textContent = win ? "🏆" : "😕";
    $("resText").textContent = win ? T.jpDemoWin(fund.toLocaleString(lang)) : T.jpDemoLose;
    $("resultOv").classList.add("on");
    App.render();
  },
  closeResult() {
    $("resultOv").classList.remove("on");
    if (Sim.jpAuto) { Sim.jpAuto = false; App.jpDemoDraw(); }
  },
  async placeBet() {
    if (CONFIG.demoPlay && !D.connected) { App.simPlay(); return; }
    if (!D.connected) { App.connect(); return; }
    if (D.myTicket) return;
    if (!CONFIG.testnet && !localStorage.getItem("manthan_consent")) {
      $("consentOv").classList.add("on"); return;
    }
    if (CONFIG.demoMode) {
      D.myTicket = true; D.round.players += 1;
      App.render();
      return;
    }
    // ставка = пустой перевод 1.1 GRAM на контракт (контракт понимает это как участие)
    await App.tc.sendTransaction({
      validUntil: Math.floor(Date.now() / 1000) + 300,
      messages: [{ address: CONFIG.contractLottery, amount: "1100000000" }],
    });
    D.myTicket = true;
    App.render();
  },
  verify() {
    // пока не было настоящих розыгрышей — проверять нечего; честно говорим об этом.
    // Реальный пересчёт commit-reveal появится вместе с первым розыгрышем.
    if (!D.lastDraw) {
      $("verifyResult").textContent = T.verifyNone;
      $("verifyResult").style.color = "var(--dim)";
      return;
    }
    $("verifyResult").textContent = T.verifyOk;
    $("verifyResult").style.color = "var(--gold)";
  },
  countdown() {
    if (Sim.active && Date.now() >= Sim.deadline) { App.simFinish(); return; }
    const ms = Math.max(0, (Sim.active ? Sim.deadline : D.round.deadline) - Date.now());
    const h = String(Math.floor(ms / 3600000)).padStart(2, "0");
    const m = String(Math.floor(ms % 3600000 / 60000)).padStart(2, "0");
    const s = String(Math.floor(ms % 60000 / 1000)).padStart(2, "0");
    $("countdown").textContent = `${h}:${m}:${s}`;

  render() {
    const demoUser = CONFIG.demoPlay && !D.connected;
    $("demoBal").style.display = demoUser ? "" : "none";
    if (demoUser) $("demoBal").textContent = T.demoBal(Sim.balance.toLocaleString(lang));

      $("prize").textContent = prize.toLocaleString(lang);
      $("fillBar").style.width = (Sim.players / CONFIG.maxPlayers * 100) + "%";

      $("betBtn").disabled = true;
      $("betHint").textContent = T.betHint(Sim.players);
    } else {
      const prize = Math.round(D.round.players * CONFIG.betAmount * 0.88 * 10) / 10;
      $("roundLabel").textContent = T.round(D.round.id);
      $("prize").textContent = prize.toLocaleString(lang);
      $("fillBar").style.width = (D.round.players / CONFIG.maxPlayers * 100) + "%";
      $("partLabel").textContent = T.part(D.round.players, CONFIG.maxPlayers);
      $("betBtn").textContent = D.myTicket ? T.inRound
        : demoUser ? T.demoBet(CONFIG.betAmount) : T.bet(CONFIG.betAmount);
      $("betBtn").disabled = D.myTicket;
      $("betHint").textContent = demoUser ? T.demoHint
        : T.betHint(D.round.players + (D.myTicket ? 0 : 1));
    }
    let jpFund, jpWhenTxt, jpDaysTxt, jpPlays, jpTickets, jpTotal;
    if (demoUser) {
      const jp = Sim.jp;
      jpFund = jp.fund; jpPlays = jp.plays;
      jpTickets = jp.plays >= CONFIG.minPlays ? jp.losses : 0;
      jpTotal = jpTickets + jp.bots;
      jpWhenTxt = T.jpDemoWhen; jpDaysTxt = "🎮 ›";
    } else {
      jpFund = D.jackpot.fund; jpPlays = D.jackpot.myPlays;
      jpTickets = D.jackpot.myTickets; jpTotal = D.jackpot.totalTickets;
      const jd = Math.floor((D.jackpot.deadline - Date.now()) / 86400000);
      const jh = Math.floor((D.jackpot.deadline - Date.now()) % 86400000 / 3600000);
      jpWhenTxt = T.jpWhen(jd, jh); jpDaysTxt = T.days(jd) + " ›";

    $("jpFundMini").textContent = jpFund.toLocaleString(lang) + " GRAM";

    $("jpWhen").textContent = jpWhenTxt;
    $("jpFund").textContent = jpFund.toLocaleString(lang);

    $("jpTotal").textContent = jpTotal.toLocaleString(lang);

      ? `<div class="item"><span style="color:var(--dim)">${T.histEmpty}</span></div>`
      : D.history.map(h => {
        const left = `${h.demo ? "🎮 " + T.demoTag : "#" + h.id} · ${h.prize.toLocaleString(lang)} GRAM`;
        const right = h.win
          ? `<span class="win" style="color:var(--gold)">+${h.amount.toLocaleString(lang)} · ${T.win}</span>`
          : h.winner
            ? `<span style="color:var(--dim)">${T.winnerShort(h.winner)}</span>`
            : `<span style="color:var(--dim)">${T.lost}</span>`;
        return `<div class="item"><span>${left}</span>${right}</div>`;
      }).join("");
    $("fairCommit").textContent = D.lastDraw ? D.lastDraw.commit : "—";
    $("fairSecret").textContent = D.lastDraw ? D.lastDraw.secret : "—";
    $("fairWinner").textContent = D.lastDraw ? "#" + D.lastDraw.winnerIndex : "—";
  },
  initTexts() {
    $("t_untilDraw").textContent = T.untilDraw;
    $("t_weeklyJp").textContent = T.weeklyJp;
    $("t_jpAmong").textContent = T.jpAmong;
    $("t_yourPlays").textContent = T.yourPlays;
    $("t_yourTickets").textContent = T.yourTickets;
    $("t_allTickets").textContent = T.allTickets;
    $("t_yourChance").textContent = T.yourChance;
    $("t_jpRules").textContent = T.jpRules;
    $("t_howItWorks").textContent = T.howItWorks;
    $("t_fairText").textContent = T.fairText;
    $("t_lastDraw").textContent = T.lastDraw;
    $("t_winnerIdx").textContent = T.winnerIdx;
    $("t_verifyBtn").textContent = T.verify;
    $("n_home").textContent = T.home;
    $("n_jackpot").textContent = T.jackpot;
    $("n_history").textContent = T.history;
    $("n_fair").textContent = T.fair;
    $("n_rules").textContent = T.rules;
    $("rulesBody").innerHTML = T.rulesHtml;
    $("consentBody").innerHTML = T.consentHtml;
    $("t_consentTitle").textContent = T.consentTitle;
    $("t_consentChk").textContent = T.consentChk;
    $("consentBtn").textContent = T.consentPlay;
    $("t_testnetText").textContent = T.testnetText;
    $("t_testnetOk").textContent = T.testnetOk;
    $("resAgain").textContent = T.demoAgain;
    $("resClose").textContent = T.demoClose;
    $("jpDrawBtn").textContent = T.jpDemoDraw;
    $("walletBtn").textContent = T.connect;
    $("langBtn").textContent = lang === "ru" ? "EN" : "RU";
  },
  init() {
    if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#0E0E11"); tg.setBackgroundColor("#0E0E11"); }
    if (CONFIG.demoMode) $("demoBadge").style.display = "block";
    $("appName").textContent = CONFIG.appName;
    D.history = [...Sim.loadHist(), ...D.history];  // демо-игры прошлых сессий
    if (!CONFIG.demoMode && window.TON_CONNECT_UI) {
      App.tc = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: CONFIG.manifestUrl });
      App.tc.onStatusChange((w) => {
        D.connected = !!w;
        D.wallet = w ? w.account.address : null;   // raw-форма "0:hex"
        if (!w) { D.myTicket = false; D.jackpot.myPlays = 0; D.jackpot.myTickets = 0; }
        $("walletBtn").textContent = w
          ? w.account.address.slice(0, 4) + "…" + w.account.address.slice(-4)
          : T.connect;
        Chain.refresh(); Chain.loadHistory();      // подтянуть персональные данные
      });
    }
    App.initTexts(); App.render();
    if (CONFIG.testnet) $("testnetOv").classList.add("on");
    setInterval(App.countdown, 1000); App.countdown();
    if (!CONFIG.demoMode) {
      Chain.refresh(); setInterval(Chain.refresh, 15000);
      Chain.loadHistory(); setInterval(Chain.loadHistory, 60000);
    }
  }
};
App.init();
</script>
</body>
</html>
